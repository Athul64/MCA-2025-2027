
<!DOCTYPE html>
<html>
<head>
    <title>HTML Tags Demo</title>
</head>
<body>
    <h1>Welcome to HTML Tags Demo</h1>

    <p>This is a paragraph tag.</p>

    <h2>Text Formatting</h2>
    <b>Bold Text</b><br>
    <i>Italic Text</i><br>
    <u>Underlined Text</u><br>

    <h2>Lists</h2>
    <ul>
        <li>Apple</li>
        <li>Banana</li>
        <li>Orange</li>
    </ul>

    <ol>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ol>

    <h2>Image</h2>
    <img src="https://via.placeholder.com/200" alt="Sample Image">

    <h2>Link</h2>
    <a href="https://www.google.com">Visit Google</a>

    <h2>Table</h2>
    <table border="1">
        <tr>
            <th>Name</th>
            <th>Age</th>
        </tr>
        <tr>
            <td>John</td>
            <td>21</td>
        </tr>
    </table>
</body>
</html>
